name: CICD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Maven Project
        run: mvn clean package

      - name: Build Docker Image
        run: docker build -t 210447604094.dkr.ecr.ap-south-1.amazonaws.com/maven-web-application:${{ github.run_number }} .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-south-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      
      - name: Authenticate With ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Docker Image
        run: |
          docker push 210447604094.dkr.ecr.ap-south-1.amazonaws.com/maven-web-application:${{ github.run_number }} 
      
      - name: Update Docker Image Tag in Kubernetes Manifest File
        run: |
          sed -i "s/Build_Tag/${{ github.run_number }}/g" MavenWebApplication.yaml
      
      - name: Configure Kubect for EKS
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name Amazon_Production_EKS_Cluster

      - name: Deploy Application to EKS
        run: |
          kubectl delete deployment webpage-deployment -n production || true
          kubectl apply -f MavenWebApplication.yaml